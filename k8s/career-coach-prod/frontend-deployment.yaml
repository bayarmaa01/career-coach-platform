apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-prod
  namespace: career-coach-prod
  labels:
    app: frontend-prod
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-prod
  template:
    metadata:
      labels:
        app: frontend-prod
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: frontend-prod:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_URL
          value: "http://backend-service:4100/api"
        - name: VITE_AI_SERVICE_URL
          value: "http://ai-service:5100"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

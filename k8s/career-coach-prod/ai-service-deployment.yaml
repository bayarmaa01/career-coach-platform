apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service-prod
  namespace: career-coach-prod
  labels:
    app: ai-service-prod
    tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service-prod
  template:
    metadata:
      labels:
        app: ai-service-prod
        tier: ai
    spec:
      containers:
      - name: ai-service
        image: ai-service-prod:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5100
        env:
        - name: PYTHONPATH
          value: /app
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_PASSWORD
        - name: MODEL_CACHE_DIR
          value: /app/models
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: DISABLE_SPACY
          value: "true"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GEMINI_API_KEY
        - name: GEMINI_PROJECT_NAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GEMINI_PROJECT_NAME
        - name: GEMINI_PROJECT_NUMBER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GEMINI_PROJECT_NUMBER
        - name: AI_MODEL_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: AI_MODEL_API_KEY
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: LOG_LEVEL
          value: "INFO"
        - name: GEMINI_MODEL
          value: "gemini-1.5-flash"
        - name: GEMINI_TIMEOUT
          value: "30"
        - name: GEMINI_MAX_RETRIES
          value: "3"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5100
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5100
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/uploads
        - name: models-volume
          mountPath: /app/models
      volumes:
      - name: uploads-volume
        emptyDir: {}
      - name: models-volume
        emptyDir: {}

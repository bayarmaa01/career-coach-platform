apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: career-coach-prod
  labels:
    app: prometheus
    tier: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    rule_files:
      # - "first_rules.yml"
      # - "second_rules.yml"
    
    scrape_configs:
      # Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      # Career Coach Services
      - job_name: 'career-coach-backend'
        static_configs:
          - targets: ['backend-service:4100']
        metrics_path: '/api/health'
        scrape_interval: 30s
      
      - job_name: 'career-coach-ai-service'
        static_configs:
          - targets: ['ai-service:5100']
        metrics_path: '/health'
        scrape_interval: 30s
      
      - job_name: 'career-coach-frontend'
        static_configs:
          - targets: ['frontend-service:3100']
        metrics_path: '/'
        scrape_interval: 30s

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: career-coach-prod
data:
  # Database Configuration
  POSTGRES_DB: career_coach_prod
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  
  # Redis Configuration
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  
  # Service URLs (Internal Kubernetes Communication)
  BACKEND_URL: "http://backend-service:4100/api"
  FRONTEND_URL: "http://frontend-service:3100"
  AI_SERVICE_URL: "http://ai-service:5100"
  
  # JWT Configuration
  JWT_EXPIRES_IN: "7d"
  
  # Application Settings
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  
  # CORS Settings
  CORS_ORIGIN: "http://frontend-service:3100"
  
  # File Upload Settings
  MAX_FILE_SIZE: "10485760"
  UPLOAD_DIR: "/app/uploads"

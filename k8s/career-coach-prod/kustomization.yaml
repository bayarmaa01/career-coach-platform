apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: career-coach-prod
namespace: career-coach-prod
resources:
# Infrastructure
- namespace.yaml
- secrets.yaml
- configmap.yaml

# Database
- postgres-pvc.yaml
- postgres-init-configmap.yaml
- postgres-statefulset.yaml
- postgres-service.yaml

# Cache
- redis-deployment.yaml
- redis-service.yaml

# Backend Services
- backend-deployment.yaml
- backend-service.yaml
- ai-service-deployment.yaml
- ai-service-service.yaml

# Frontend
- frontend-deployment.yaml
- frontend-service.yaml

# Monitoring
- grafana-deployment.yaml
- grafana-service.yaml
- prometheus-deployment.yaml
- prometheus-service.yaml
- prometheus-configmap.yaml

commonLabels:
  app.kubernetes.io/name: career-coach-platform
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: career-coach-platform

commonAnnotations:
  config.kubernetes.io/origin: "k8s/career-coach-prod"
  app.kubernetes.io/version: "v1.0.0"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-prod
  namespace: career-coach-prod
  labels:
    app: backend-prod
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-prod
      tier: backend
  template:
    metadata:
      labels:
        app: backend-prod
        tier: backend
    spec:
      containers:
      - name: backend
        image: backend-prod:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: DATABASE_URL
          value: "postgresql://postgres:adminpassword@postgres-service:5432/career_coach_prod"
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: "career_coach_prod"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "adminpassword"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          value: "redispassword"
        - name: JWT_SECRET
          value: "your-jwt-secret-key"
        - name: JWT_EXPIRES_IN
          value: "7d"
        - name: FRONTEND_URL
          value: "http://frontend-service:3100"
        - name: CORS_ORIGIN
          value: "http://frontend-service:3100"
        - name: RATE_LIMIT_WINDOW_MS
          value: "900000"
        - name: RATE_LIMIT_MAX_REQUESTS
          value: "100"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

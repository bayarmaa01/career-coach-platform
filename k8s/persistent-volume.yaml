apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  namespace: career-coach-prod
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: azure-disk
  hostPath:
    path: /data/postgres-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: career-coach-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: azure-disk
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: career-coach-prod
data:
  POSTGRES_DB: "career_coach_prod"
  JWT_EXPIRES_IN: "7d"
  FRONTEND_URL: "https://career-coach.example.com"
  BACKEND_URL: "https://api.career-coach.example.com"
  MAX_FILE_SIZE: "10485760"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: init-scripts
  namespace: career-coach-prod
data:
  init.sql: |
    -- Enable pgvector extension
    CREATE EXTENSION IF NOT EXISTS vector;
    
    -- Create UUID extension
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    
    -- Users table
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        email VARCHAR(255) UNIQUE NOT NULL,
        password VARCHAR(255) NOT NULL,
        first_name VARCHAR(100) NOT NULL,
        last_name VARCHAR(100) NOT NULL,
        role VARCHAR(50) DEFAULT 'user',
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Resumes table
    CREATE TABLE IF NOT EXISTS resumes (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        file_name VARCHAR(255) NOT NULL,
        original_name VARCHAR(255) NOT NULL,
        file_path VARCHAR(500) NOT NULL,
        file_size INTEGER NOT NULL,
        mime_type VARCHAR(100) NOT NULL,
        status VARCHAR(50) DEFAULT 'uploaded' CHECK (status IN ('uploaded', 'processing', 'completed', 'failed', 'ai_service_failed')),
        analysis_data JSONB,
        uploaded_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        processed_at TIMESTAMP,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Skills table
    CREATE TABLE IF NOT EXISTS skills (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        name VARCHAR(100) NOT NULL,
        category VARCHAR(50),
        description TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Career paths table
    CREATE TABLE IF NOT EXISTS career_paths (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        title VARCHAR(200) NOT NULL,
        description TEXT,
        required_skills JSONB,
        salary_range VARCHAR(100),
        growth_potential VARCHAR(20),
        education_level VARCHAR(100),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Recommendations table
    CREATE TABLE IF NOT EXISTS recommendations (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        resume_id UUID REFERENCES resumes(id) ON DELETE CASCADE,
        career_path_id UUID REFERENCES career_paths(id),
        confidence_score DECIMAL(3,2),
        reasoning TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Courses table
    CREATE TABLE IF NOT EXISTS courses (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        title VARCHAR(200) NOT NULL,
        description TEXT,
        provider VARCHAR(100),
        url VARCHAR(500),
        skill_ids JSONB,
        difficulty_level VARCHAR(20),
        duration_hours INTEGER,
        price DECIMAL(10,2),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create indexes for performance
    CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
    CREATE INDEX IF NOT EXISTS idx_resumes_user_id ON resumes(user_id);
    CREATE INDEX IF NOT EXISTS idx_resumes_status ON resumes(status);
    CREATE INDEX IF NOT EXISTS idx_recommendations_user_id ON recommendations(user_id);
    CREATE INDEX IF NOT EXISTS idx_skills_name ON skills(name);
    CREATE INDEX IF NOT EXISTS idx_career_paths_title ON career_paths(title);
    
    -- Insert default data
    INSERT INTO skills (name, category, description) VALUES
    ('JavaScript', 'Programming', 'Programming language for web development'),
    ('Python', 'Programming', 'General purpose programming language'),
    ('React', 'Framework', 'JavaScript library for building user interfaces'),
    ('Node.js', 'Runtime', 'JavaScript runtime for server-side development'),
    ('SQL', 'Database', 'Database query language'),
    ('Machine Learning', 'AI', 'Artificial intelligence and machine learning'),
    ('Communication', 'Soft Skill', 'Effective communication skills'),
    ('Leadership', 'Soft Skill', 'Leadership and management skills')
    ON CONFLICT (name) DO NOTHING;
    
    INSERT INTO career_paths (title, description, required_skills, salary_range, growth_potential, education_level) VALUES
    ('Full Stack Developer', 'Develop both frontend and backend applications', '["JavaScript", "React", "Node.js", "SQL"]', '$80,000-$150,000', 'High', 'Bachelor'),
    ('Data Scientist', 'Analyze and interpret complex data', '["Python", "SQL", "Machine Learning"]', '$90,000-$180,000', 'Very High', 'Master'),
    ('Frontend Developer', 'Build user interfaces and web applications', '["JavaScript", "React", "CSS"]', '$70,000-$130,000', 'High', 'Bachelor'),
    ('Backend Developer', 'Build server-side applications and APIs', '["Python", "Node.js", "SQL"]', '$75,000-$140,000', 'High', 'Bachelor')
    ON CONFLICT (title) DO NOTHING;

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: career-coach-db
    environment:
      POSTGRES_DB: career_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - career-coach-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: career-coach-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - career-coach-network

  # Backend API (Simple)
  backend:
    image: node:18-alpine
    container_name: career-coach-backend
    working_dir: /app
    command: sh -c "ls -la && npm install && npm start"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: career_coach
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-key
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - career-coach-network
    restart: unless-stopped

  # AI Service (Simple)
  ai-service:
    image: python:3.11-slim
    container_name: career-coach-ai
    working_dir: /app
    command: sh -c "ls -la && pip install fastapi uvicorn python-multipart python-dotenv && python main-simple.py"
    environment:
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5000
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
      - ./ai-service/uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - career-coach-network
    restart: unless-stopped

  # Frontend (Simple)
  frontend:
    image: node:18-alpine
    container_name: career-coach-frontend
    working_dir: /app
    command: sh -c "ls -la && npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    networks:
      - career-coach-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  career-coach-network:
    driver: bridge

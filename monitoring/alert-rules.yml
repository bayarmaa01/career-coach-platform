groups:
  - name: career-coach-alerts
    rules:
      # System Alerts
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="default"}[5m])) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes"

      - alert: HighMemoryUsage
        expr: sum(container_memory_usage_bytes{namespace="default"}) / sum(kube_node_status_allocatable_memory_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% for more than 5 minutes"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="default"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod is crash looping"
          description: "Pod {{ $labels.pod }} is restarting frequently"

      # Backend API Alerts
      - alert: HighBackendErrorRate
        expr: (sum(rate(http_requests_total{job="backend", status_code=~"4.."}[5m])) + sum(rate(http_requests_total{job="backend", status_code=~"5.."}[5m]))) / sum(rate(http_requests_total{job="backend"}[5m])) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High backend error rate"
          description: "Backend error rate is above 5% for more than 2 minutes"

      - alert: HighBackendLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High backend latency"
          description: "Backend P95 latency is above 1 second for more than 5 minutes"

      - alert: LowBackendThroughput
        expr: sum(rate(http_requests_total{job="backend"}[5m])) < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low backend throughput"
          description: "Backend request rate is below 10 RPS for more than 10 minutes"

      # AI Service Alerts
      - alert: HighAIServiceErrorRate
        expr: (sum(rate(http_requests_total{job="ai-service", status_code=~"4.."}[5m])) + sum(rate(http_requests_total{job="ai-service", status_code=~"5.."}[5m]))) / sum(rate(http_requests_total{job="ai-service"}[5m])) * 100 > 3
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High AI service error rate"
          description: "AI service error rate is above 3% for more than 2 minutes"

      - alert: HighAIModelInferenceTime
        expr: histogram_quantile(0.95, sum(rate(model_inference_duration_seconds_bucket{job="ai-service"}[5m])) by (le)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High AI model inference time"
          description: "AI model inference time is above 10 seconds for more than 5 minutes"

      - alert: AIServiceDown
        expr: up{job="ai-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI service is down"
          description: "AI service has been down for more than 1 minute"

      # Frontend Alerts
      - alert: HighFrontendLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="frontend"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High frontend latency"
          description: "Frontend P95 latency is above 2 seconds for more than 5 minutes"

      # Kubernetes Health Alerts
      - alert: PodNotReady
        expr: kube_pod_status_ready{condition="true"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod is not ready"
          description: "Pod {{ $labels.pod }} has not been ready for more than 10 minutes"

      - alert: DeploymentReplicaMismatch
        expr: kube_deployment_status_replicas != kube_deployment_spec_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment replica mismatch"
          description: "Deployment {{ $labels.deployment }} has {{ $labels.replicas }} replicas but wants {{ $labels.desired }}"

      - alert: NodeDown
        expr: kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node is down"
          description: "Node {{ $labels.node }} has been down for more than 5 minutes"

      # Error Budget Alerts
      - alert: ErrorBudgetBurn
        expr: (sum(rate(http_requests_total{job="backend", status_code=~"5.."}[5m]))) / (sum(rate(http_requests_total{job="backend"}[5m]))) * 100 > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error budget burning too fast"
          description: "Error budget is burning at {{ $value }}% per 5 minutes"

      - alert: ServiceLevelObjectiveViolation
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SLO violation detected"
          description: "95th percentile latency is above SLO threshold of 500ms"

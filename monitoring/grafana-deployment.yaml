apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: career-coach-prod
data:
  grafana.ini: |
    [server]
    root_url = https://grafana.career-coach.example.com
    
    [database]
    type = postgres
    host = postgres-service
    name = grafana
    user = grafana
    password = ${GF_DATABASE_PASSWORD}
    
    [security]
    admin_user = admin
    admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
    
    [auth.anonymous]
    enabled = false
    
    [users]
    allow_sign_up = false
    
    [smtp]
    enabled = true
    host = smtp.gmail.com:587
    user = ${GF_SMTP_USER}
    password = ${GF_SMTP_PASSWORD}
    from_address = noreply@career-coach.example.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: career-coach-prod
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets-prod
              key: GRAFANA_ADMIN_PASSWORD
        - name: GF_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets-prod
              key: GRAFANA_DB_PASSWORD
        - name: GF_SMTP_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets-prod
              key: SMTP_USER
        - name: GF_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets-prod
              key: SMTP_PASSWORD
        volumeMounts:
        - name: grafana-config
          mountPath: /etc/grafana
        - name: grafana-storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: grafana-config
        configMap:
          name: grafana-config
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: career-coach-prod
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: career-coach-prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - grafana.career-coach.example.com
    secretName: grafana-tls
  rules:
  - host: grafana.career-coach.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: career-coach-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: azure-disk

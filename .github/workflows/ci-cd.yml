name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]


permissions:
  contents: read
  packages: write 
    
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm install

      - name: Run lint
        run: npm run lint || true

      - name: Run tests
        run: npm test -- --passWithNoTests || true

      - name: Build
        run: npm run build


  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm install

      - name: Run lint
        run: npm run lint || true

      - name: Run tests
        run: npm test -- --passWithNoTests || true

      - name: Build
        run: npm run build


  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest || true


  build-images:
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-service]

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend
        run: |
          docker build -t ghcr.io/bayarmaa01/career-coach-platform/frontend:latest ./frontend
          docker push ghcr.io/bayarmaa01/career-coach-platform/frontend:latest

      - name: Build backend
        run: |
          docker build -t ghcr.io/bayarmaa01/career-coach-platform/backend:latest ./backend
          docker push ghcr.io/bayarmaa01/career-coach-platform/backend:latest

      - name: Build AI service
        run: |
          docker build -t ghcr.io/bayarmaa01/career-coach-platform/ai-service:latest ./ai-service
          docker push ghcr.io/bayarmaa01/career-coach-platform/ai-service:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy
        run: |
          kubectl set image deployment/frontend frontend=ghcr.io/${{ github.repository }}/frontend:latest
          kubectl set image deployment/backend backend=ghcr.io/${{ github.repository }}/backend:latest
          kubectl set image deployment/ai-service ai-service=ghcr.io/${{ github.repository }}/ai-service:latest
name: Career Coach Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bayarmaa01/career-coach-platform

jobs:
  # ================= CI =================
  test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Run Tests
        run: npm test -- --passWithNoTests || true

      - name: Build
        run: npm run build || true

  # ================= AI SERVICE TEST =================
  ai-service-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: pytest || true

  # ================= BUILD & PUSH DOCKER =================
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-build, ai-service-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend
        run: |
          docker build -t $IMAGE_PREFIX/frontend:latest ./frontend
          docker push $IMAGE_PREFIX/frontend:latest

      - name: Build and Push Backend
        run: |
          docker build -t $IMAGE_PREFIX/backend:latest ./backend
          docker push $IMAGE_PREFIX/backend:latest

      - name: Build and Push AI Service
        run: |
          docker build -t $IMAGE_PREFIX/ai-service:latest ./ai-service
          docker push $IMAGE_PREFIX/ai-service:latest

  # ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Update Images
        run: |
          kubectl set image deployment/frontend frontend=$IMAGE_PREFIX/frontend:latest
          kubectl set image deployment/backend backend=$IMAGE_PREFIX/backend:latest
          kubectl set image deployment/ai-service ai-service=$IMAGE_PREFIX/ai-service:latest

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/ai-service

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bayarmaa01/career-coach-platform

jobs:

# ---------------- FRONTEND ----------------

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test -- --passWithNoTests || true

      - name: Build
        run: npm run build


# ---------------- BACKEND ----------------

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test -- --passWithNoTests || true

      - name: Build
        run: npm run build


# ---------------- AI SERVICE ----------------

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest || true


# ---------------- BUILD DOCKER IMAGES ----------------

  build-images:
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-service]

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend
        run: |
          docker build -t $IMAGE_PREFIX/frontend:latest ./frontend
          docker push $IMAGE_PREFIX/frontend:latest

      - name: Build and Push Backend
        run: |
          docker build -t $IMAGE_PREFIX/backend:latest ./backend
          docker push $IMAGE_PREFIX/backend:latest

      - name: Build and Push AI Service
        run: |
          docker build -t $IMAGE_PREFIX/ai-service:latest ./ai-service
          docker push $IMAGE_PREFIX/ai-service:latest


# ---------------- DEPLOY TO KUBERNETES ----------------

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Deploy new images
        run: |
          kubectl set image deployment/frontend frontend=$IMAGE_PREFIX/frontend:latest
          kubectl set image deployment/backend backend=$IMAGE_PREFIX/backend:latest
          kubectl set image deployment/ai-service ai-service=$IMAGE_PREFIX/ai-service:latest
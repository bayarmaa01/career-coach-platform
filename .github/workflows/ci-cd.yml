name: Career Coach Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: bayarmaa/career-coach-platform

jobs:
  # ================= CI: BUILD & TEST =================
  
  test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Run Tests
        run: npm test -- --passWithNoTests || true

      - name: Build
        run: npm run build || true

  # ================= AI SERVICE TEST =================
  ai-service-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Tests
        run: pytest --cov=app --cov-report=xml || true

  # ================= BUILD & PUSH DOCKER IMAGES =================
  
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-build, ai-service-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}
          tags: |
            bayarmaa/career-coach-platform:frontend-latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: bayarmaa/career-coach-platform:frontend-latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: bayarmaa/career-coach-platform:backend-latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          platforms: linux/amd64
          push: true
          tags: bayarmaa/career-coach-platform:ai-service-latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================= UPDATE HELM CHARTS =================
  
  update-helm:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Helm Chart Values
        run: |
          # Update image tags in values.yaml
          sed -i "s|frontendImage:.*|frontendImage: bayarmaa/career-coach-platform:frontend-latest|g" helm/values.yaml
          sed -i "s|backendImage:.*|backendImage: bayarmaa/career-coach-platform:backend-latest|g" helm/values.yaml
          sed -i "s|aiServiceImage:.*|aiServiceImage: bayarmaa/career-coach-platform:ai-service-latest|g" helm/values.yaml

      - name: Commit and Push Helm Updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          
          git add helm/values.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update image tag"
            git push
          fi

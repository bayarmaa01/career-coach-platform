# Secrets for production environment
# This file should be encrypted and stored securely

global:
  jwtSecret: "your-super-secure-jwt-secret-key-here"

postgresql:
  auth:
    postgresPassword: "your-super-secure-db-password-here"

redis:
  auth:
    password: "your-super-secure-redis-password-here"

# External service configurations
externalServices:
  aiModelApiKey: "your-ai-model-api-key"
  emailService:
    smtpUser: "your-smtp-user"
    smtpPassword: "your-smtp-password"
  monitoring:
    slackWebhook: "your-slack-webhook-url"
    datadogApiKey: "your-datadog-api-key"

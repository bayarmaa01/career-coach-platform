apiVersion: v2
name: career-coach
description: AI-Powered Personal Career Coach Platform
type: application
version: 0.1.0
appVersion: "1.0.0"

keywords:
  - career
  - ai
  - coaching
  - kubernetes

home: https://github.com/bayarmaa01/career-coach-platform
sources:
  - https://github.com/bayarmaa01/career-coach-platform

maintainers:
  - name: Career Coach Team
    email: team@career-coach.example.com

dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

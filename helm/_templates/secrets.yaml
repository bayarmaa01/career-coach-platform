apiVersion: v1
kind: Secret
metadata:
  name: {{ include "career-coach.fullname" . }}
  labels:
    {{- include "career-coach.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_PASSWORD: {{ .Values.postgresql.auth.postgresPassword | b64enc }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | b64enc }}
  JWT_SECRET: {{ .Values.global.jwtSecret | default "changeme" | b64enc }}

# Production overrides for career-coach platform

# Image Registry
global:
  imageRegistry: docker.io
  jwtSecret: "your-production-jwt-secret-here"

# Production replicas
frontend:
  replicaCount: 3
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

backend:
  replicaCount: 3
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

aiService:
  replicaCount: 2
  resources:
    requests:
      memory: "1Gi"
      cpu: "1000m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# Production storage
persistence:
  uploads:
    size: 50Gi
    storageClass: "premium-ssd"
  models:
    size: 20Gi
    storageClass: "premium-ssd"

# Production database
postgresql:
  auth:
    postgresPassword: "your-production-db-password"
  primary:
    persistence:
      size: 100Gi
      storageClass: "premium-ssd"
    resources:
      requests:
        memory: "1Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"

# Production cache
redis:
  auth:
    password: "your-production-redis-password"
  master:
    persistence:
      size: 20Gi
      storageClass: "premium-ssd"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

# Production URLs
ingress:
  hosts:
    - host: career-coach.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.career-coach.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: career-coach-prod-tls
      hosts:
        - career-coach.example.com
        - api.career-coach.example.com

# Production monitoring
monitoring:
  prometheus:
    serviceMonitor:
      enabled: true
      interval: 15s
  grafana:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "premium-ssd"

# Production security
podSecurityContext:
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 2000
  capabilities:
    drop:
      - ALL
      add:
        - NET_BIND_SERVICE

# Production autoscaling
frontend:
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

backend:
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

aiService:
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Default values for career-coach.
# This is a YAML-formatted file.

# Global Settings
global:
  imageRegistry: docker.io
  imagePullSecrets: []
  storageClass: ""

# Frontend Configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: career-coach/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Backend Configuration
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: career-coach/backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env:
    NODE_ENV: production
    PORT: "5000"
    JWT_EXPIRES_IN: "7d"
    MAX_FILE_SIZE: "10485760"
    RATE_LIMIT_WINDOW_MS: "900000"
    RATE_LIMIT_MAX_REQUESTS: "100"

# AI Service Configuration
aiService:
  enabled: true
  replicaCount: 1
  image:
    repository: career-coach/ai-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env:
    PYTHONPATH: "/app"
    LOG_LEVEL: "INFO"

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "changeme"
    database: "career_coach"
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: ""
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Redis Configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: "changeme"
  master:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# Ingress Configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: career-coach.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.career-coach.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    - secretName: career-coach-tls
      hosts:
        - career-coach.example.com
        - api.career-coach.example.com

# Persistent Storage
persistence:
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteMany
  models:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
  grafana:
    enabled: true
    persistence:
      enabled: true
      size: 5Gi

# Service Accounts
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security
podSecurityContext:
  fsGroup: 999

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
    - ALL

# Network Policies
networkPolicy:
  enabled: false

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: 1

# SonarCloud Project Configuration
# Project Key: bayarmaa01_career-coach-platform
# Organization: bayarmaa01

sonar.projectKey=bayarmaa01_career-coach-platform
sonar.organization=bayarmaa01

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Career Coach Platform
sonar.projectVersion=1.0

# Path to sources
sonar.sources=frontend/src,backend/src,ai-service/app

# Path to tests
sonar.tests=frontend/src,backend/src,ai-service/tests

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js,**/*.spec.ts,**/*.test.js,**/__tests__/**,**/venv/**,**/__pycache__/**

# JavaScript/TypeScript configuration
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

# Python configuration
sonar.python.coverage.reportPaths=ai-service/coverage.xml

# Language-specific properties
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.python.file.suffixes=.py

# SCM settings
sonar.scm.provider=git

# Quality gate
sonar.qualitygate.wait=true

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: career-coach-db
    environment:
      POSTGRES_DB: career_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - career-coach-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_coach"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: career-coach-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - career-coach-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: career-coach-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: career_coach
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-key
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - career-coach-network
    restart: unless-stopped

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: career-coach-ai
    environment:
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5000
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
      - ./ai-service/uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - career-coach-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: career-coach-frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - career-coach-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  career-coach-network:
    driver: bridge

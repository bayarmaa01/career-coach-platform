version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: career-coach-db-dev
    environment:
      POSTGRES_DB: career_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - career-coach-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: career-coach-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - career-coach-network

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: career-coach-backend-dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: career_coach
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-key
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - career-coach-network
    command: npm run dev

  # AI Service (Development)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: career-coach-ai-dev
    environment:
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5000
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
      - ./ai-service/uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - career-coach-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  career-coach-network:
    driver: bridge
